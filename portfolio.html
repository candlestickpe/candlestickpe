  <!-- ✅ Pretendard (CDN) -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

  <style>
    :root{
      --hero-h: clamp(250px, 40vw, 400px);
      --hero-focus-y: 40%;
      --subhead-size: clamp(1.25rem, 2.2vw, 2rem);

      /* ✅ 좌우를 "조금" 넓히기 */
      --section-max-w: 1320px;
      --section-x-pad: 18px;

      --brand-blue: #0b1140;
      --line-gray: #e5e7eb;
      --text-dark: #111;
      --text-mid: #333;
      --cell-bg: #fff;
    }

    html,
    body,
    button,
    input,
    textarea,
    select{
      font-family: Pretendard, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial,
                   "Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic", sans-serif;
    }

    /* ===== Hero ===== */
    .hero{
      position: relative; min-height: var(--hero-h);
      background:#333 url('high.PNG') no-repeat 50% var(--hero-focus-y)/cover;
    }
    .hero::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to bottom,rgba(0,0,0,.35),rgba(0,0,0,.15));
    }
    .hero > .container-fluid{position:relative;z-index:1;}
    @media (max-width:768px){ :root{ --hero-focus-y: 88%; } }

    .brand{
      position:absolute;top:10px;left:20px;z-index:2;
      font-weight:700;color:#fff;font-size:1.1rem;letter-spacing:.5px;
    }
    .hero-title{margin:0;color:#fff;}
    .hero-subtext{
      margin-top:25px; font-size:1rem; line-height:1.4;
      max-width: var(--section-max-w);
      margin-inline:auto; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.35);
      white-space: pre-line;
    }
    .center-wrap{
      text-align:center;
      padding-top: calc(var(--hero-h)*.28);
      padding-bottom: calc(var(--hero-h)*.12);
    }

    /* ===== 공통 레이아웃 ===== */
    .content-section{ background:#fff; padding:140px 0 60px; }
    .content-inner{
      width: min(var(--section-max-w), 100%);
      margin: 0 auto;
      padding: 0 var(--section-x-pad);
    }

    .section-title{
      font-weight:800;
      font-size:var(--subhead-size);
      line-height:1.2;
      margin:0;
      color:var(--text-dark);
    }
    .section-title.size-lg{ --subhead-size:2rem; }

    .hero-kicker{
      margin:0 0 12px;
      color:rgba(255,255,255,.86);
      font-size:.82rem;
      font-weight:800;
      letter-spacing:.16em;
    }
    .hero-title{
      white-space:pre-line;
      word-break:keep-all;
    }

    .portfolio-section-header{
      max-width:780px;
    }
    .portfolio-section-header .section-title{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .portfolio-section-header .section-title::before{
      content:"";
      width:4px;
      height:24px;
      background:var(--brand-blue);
      display:inline-block;
    }
    .section-description{
      margin:18px 0 0;
      color:#5b6472;
      font-size:1rem;
      line-height:1.8;
      word-break:keep-all;
    }
    .portfolio-filters{
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:10px;
      margin-top:30px;
      max-width:820px;
    }
    .portfolio-filter{
      min-height:42px;
      border:1px solid var(--brand-blue);
      border-radius:6px;
      background:#fff;
      color:var(--brand-blue);
      font-size:.9rem;
      font-weight:800;
      line-height:1.2;
      padding:0 12px;
      transition:background .18s ease, color .18s ease, box-shadow .18s ease;
    }
    .portfolio-filter:hover,
    .portfolio-filter:focus-visible{
      box-shadow:0 6px 16px rgba(12,18,46,.08);
      outline:none;
    }
    .portfolio-filter.is-active{
      background:var(--brand-blue);
      color:#fff;
    }
    .portfolio-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:20px;
      margin-top:28px;
    }
    .portfolio-card{
      position:relative;
      display:flex;
      flex-direction:column;
      min-height:390px;
      padding:0;
      border:1px solid var(--line-gray);
      border-radius:8px;
      background:#fff;
      color:inherit;
      text-align:left;
      overflow:hidden;
      box-shadow:0 8px 22px rgba(12,18,46,.06);
      cursor:pointer;
      transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
    }
    .portfolio-card:hover,
    .portfolio-card:focus-visible{
      border-color:#c7cfda;
      box-shadow:0 12px 28px rgba(12,18,46,.1);
      transform:translateY(-2px);
      outline:none;
    }
    .portfolio-card.is-active{
      border-color:var(--brand-blue);
      box-shadow:0 14px 30px rgba(12,18,46,.12);
    }
    .portfolio-card.is-active::before{
      content:"";
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:3px;
      background:var(--brand-blue);
      z-index:2;
    }
    .portfolio-card[hidden]{ display:none; }
    .portfolio-card-media{
      position:relative;
      height:148px;
      background:#f6f8fb;
      border-bottom:1px solid #eef1f5;
      overflow:hidden;
    }
    .portfolio-card-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .portfolio-card-media--logo{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      background:#fff;
    }
    .portfolio-card-media--logo img{
      width:100%;
      height:100%;
      object-fit:contain;
      box-sizing:border-box;
      padding:18px 24px;
    }
    .portfolio-card-badge{
      display:inline-flex;
      align-items:center;
      align-self:flex-start;
      min-height:26px;
      padding:0 10px;
      margin-bottom:12px;
      background:rgba(11,17,64,.92);
      color:#fff;
      border-radius:4px;
      font-size:.74rem;
      font-weight:800;
      letter-spacing:.01em;
    }
    .portfolio-card-body{
      display:flex;
      flex:1;
      flex-direction:column;
      padding:18px;
    }
    .portfolio-card-title{
      margin:0;
      color:var(--text-dark);
      font-size:1.05rem;
      font-weight:900;
      line-height:1.35;
    }
    .portfolio-card-sector{
      margin:8px 0 0;
      color:var(--brand-blue);
      font-size:.82rem;
      font-weight:800;
      line-height:1.45;
    }
    .portfolio-card-description{
      margin:14px 0 0;
      color:#4b5563;
      font-size:.9rem;
      line-height:1.65;
      word-break:keep-all;
    }
    .portfolio-card-link{
      margin-top:auto;
      padding-top:18px;
      color:var(--brand-blue);
      font-size:.86rem;
      font-weight:900;
    }
    .portfolio-detail-panel{
      margin-top:36px;
      scroll-margin-top:24px;
    }
    .portfolio-detail-shell{
      display:grid;
      grid-template-columns:minmax(260px, .8fr) minmax(0, 1.25fr);
      gap:28px;
      padding:28px;
      border:1px solid var(--line-gray);
      border-radius:8px;
      background:#fbfcfe;
      box-shadow:0 10px 28px rgba(12,18,46,.07);
    }
    .portfolio-detail-media{
      overflow:hidden;
      aspect-ratio:16 / 10;
      background:#fff;
      border:1px solid #e9edf3;
      border-radius:8px;
    }
    .portfolio-detail-media img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .portfolio-detail-media.is-logo{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
      background:#fff;
    }
    .portfolio-detail-media.is-logo img{
      object-fit:contain;
      box-sizing:border-box;
      padding:34px;
    }
    .portfolio-detail-facts{
      margin:18px 0 0;
      border-top:1px solid var(--line-gray);
    }
    .portfolio-detail-fact{
      display:grid;
      grid-template-columns:118px minmax(0,1fr);
      gap:14px;
      padding:13px 0;
      border-bottom:1px solid var(--line-gray);
      font-size:.9rem;
      line-height:1.55;
    }
    .portfolio-detail-fact dt{
      color:var(--brand-blue);
      font-weight:900;
    }
    .portfolio-detail-fact dd{
      margin:0;
      color:#333;
      word-break:keep-all;
    }
    .portfolio-detail-title{
      margin:0;
      color:var(--text-dark);
      font-size:1.55rem;
      font-weight:900;
      line-height:1.3;
    }
    .portfolio-detail-meta{
      margin:10px 0 0;
      color:#5b6472;
      font-size:.95rem;
      font-weight:700;
    }
    .portfolio-detail-blocks{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:18px;
      margin-top:24px;
    }
    .portfolio-detail-block{
      padding:18px;
      border:1px solid #e7ebf1;
      border-radius:8px;
      background:#fff;
    }
    .portfolio-detail-block h4{
      margin:0 0 10px;
      color:var(--brand-blue);
      font-size:.95rem;
      font-weight:900;
    }
    .portfolio-detail-block p{
      margin:0;
      color:#3f4754;
      font-size:.92rem;
      line-height:1.75;
      word-break:keep-all;
    }
    .portfolio-detail-block ul{
      margin:0;
      padding-left:1.05rem;
      color:#3f4754;
      font-size:.92rem;
      line-height:1.75;
      word-break:keep-all;
    }
    .portfolio-detail-block li{ margin:.35em 0; }
    .portfolio-grid.filtered-view{
      grid-template-columns:repeat(3, minmax(0, 1fr));
    }

    @media (max-width: 1100px){
      .portfolio-grid{
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }
      .portfolio-grid.filtered-view{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }
      .portfolio-detail-shell{
        grid-template-columns:1fr;
      }
    }
    @media (max-width: 768px){
      .portfolio-section-header{
        max-width:none;
      }
      .portfolio-filters{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        max-width:none;
      }
      .portfolio-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
        gap:16px;
      }
      .portfolio-card{
        min-height:360px;
      }
      .portfolio-detail-shell{
        padding:20px;
      }
      .portfolio-detail-blocks{
        grid-template-columns:1fr;
      }
    }
    @media (max-width: 576px){
      .hero-kicker{
        font-size:.76rem;
      }
      .portfolio-filters{
        gap:8px;
      }
      .portfolio-filter{
        min-height:40px;
        font-size:.82rem;
      }
      .portfolio-grid{
        grid-template-columns:1fr;
      }
      .portfolio-grid.filtered-view{
        grid-template-columns:1fr;
      }
      .portfolio-card{
        min-height:auto;
      }
      .portfolio-card-media{
        height:132px;
      }
      .portfolio-detail-fact{
        grid-template-columns:1fr;
        gap:4px;
      }
      .portfolio-detail-title{
        font-size:1.32rem;
      }
    }

    /* ===== Portfolio Table ===== */
    .portfolio-wrap{
      margin-top:28px;
      border:1px solid var(--line-gray);
      border-radius:8px;
      box-shadow:0 6px 18px rgba(0,0,0,.06);
      overflow:hidden;
      background:#fff;
    }
    .portfolio-wrap,
    .portfolio-wrap *{
      box-sizing:border-box;
    }
    .portfolio-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
    }
    .portfolio-table thead th{
      background:var(--brand-blue);
      color:#fff;
      font-weight:800;
      text-align:center;
      padding:16px 18px;
      letter-spacing:.2px;
      border-right:1px solid rgba(255,255,255,.2);
      vertical-align: middle;
    }
    .portfolio-table thead th:last-child{ border-right:none; }

    .portfolio-table tbody td{
      vertical-align: top;
      padding:22px 22px;
      border-top:1px solid var(--line-gray);
      border-right:1px solid #f2f4f7;
      background: var(--cell-bg);

      word-break: keep-all;
      overflow-wrap: normal;
    }
    .portfolio-table tbody tr:first-child td{ border-top:1px solid var(--line-gray); }
    .portfolio-table tbody td:last-child{ border-right:none; }

    .portfolio-table th:nth-child(1), .portfolio-table td:nth-child(1){ width:30%; }
    .portfolio-table th:nth-child(2), .portfolio-table td:nth-child(2){ width:70%; }
    .portfolio-table td.col-name{
      text-align:center;
      vertical-align:middle;
    }

    /* 첫번째 칸: 이미지 + 텍스트 세로 배치 */
    .p-name{
      text-align:center;
      font-weight:800;
      line-height:1.3;
      font-size:1.05rem;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      width:100%;
      gap: 14px; /* ✅ 아이콘 커져서 간격 약간 증가 */
    }

    /* ✅ 이미지 박스(아이콘) 크기 업 */
    .p-thumb-wrap{
      width: min(100%, 180px);
      max-width: 180px;
      height: 88px;
      display:flex;
      align-items:center;
      justify-content:center;

      background: var(--cell-bg);
      border: 1px solid #eef1f5;
      border-radius: 12px;                   /* 살짝 더 둥글게 */
      padding: 12px 16px;                    /* (기존 6px) */
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(0,0,0,.10);
    }
    .p-thumb{
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: transparent;
      transform: none;
    }
    .p-logo-text{
      display:flex;
      align-items:center;
      justify-content:center;
      width:100%;
      height:100%;
      font-size:clamp(.78rem, 1.05vw, .95rem);
      font-weight:900;
      letter-spacing:.08em;
      color:var(--brand-blue);
    }
    .p-thumb-wrap--wide{
      max-width: 180px;
      height: 88px;
      border-radius:12px;
      padding:12px 16px;
      background:#fff;
    }

    .p-title{
      display:block;
      font-weight:800;
    }
    .p-toggle{
      height:30px;
      border:1px solid #d8dee8;
      border-radius:999px;
      background:#fff;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      padding:0 12px;
      color:var(--brand-blue);
      font-size:.78rem;
      font-weight:800;
      line-height:1;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
      cursor:pointer;
      transition:background .2s ease, border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    .p-toggle:hover,
    .p-toggle:focus-visible{
      background:#f7f8fb;
      border-color:#bfc7d5;
      box-shadow:0 6px 16px rgba(0,0,0,.12);
      outline:none;
    }
    .p-toggle-icon{
      width:7px;
      height:7px;
      border-right:2px solid currentColor;
      border-bottom:2px solid currentColor;
      transform:translateY(-2px) rotate(45deg);
      transition:transform .28s ease;
    }
    .p-toggle[aria-expanded="true"] .p-toggle-icon{
      transform:translateY(2px) rotate(225deg);
    }
    .portfolio-detail{
      display:grid;
      gap:18px;
    }
    .portfolio-subsection{
      margin:0;
    }
    .portfolio-subheading{
      margin:0 0 8px;
      color:var(--brand-blue);
      font-size:.98rem;
      font-weight:900;
      letter-spacing:0;
    }
    .portfolio-table ul{ margin:0; padding-left:1.2em; }
    .portfolio-table li{
      margin:.5em 0;
      line-height:1.7;
      color:var(--text-mid);
      word-break: keep-all;
      overflow-wrap: normal;
    }
    .portfolio-expand-row .portfolio-expand-cell{
      padding:0;
      border-right:none;
      border-top:none;
      background:#fff;
    }
    .portfolio-expand-panel{
      max-height:0;
      overflow:hidden;
      opacity:0;
      visibility:hidden;
      transform:translateY(-8px);
      transform-origin:top;
      transition:max-height .42s ease, opacity .24s ease, transform .32s ease, visibility 0s linear .42s;
    }
    .portfolio-expand-row.is-open .portfolio-expand-panel{
      max-height:2400px;
      opacity:1;
      visibility:visible;
      transform:translateY(0);
      transition:max-height .42s ease, opacity .24s ease, transform .32s ease;
    }
    .portfolio-inline-detail{
      margin:0 22px 26px;
      padding:24px;
      background:#fbfcfe;
      border:1px solid var(--line-gray);
      border-radius:10px;
      box-shadow:0 10px 28px rgba(12,18,46,.08);
    }
    .project-fields{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      border-top:1px solid var(--line-gray);
      border-left:1px solid var(--line-gray);
      background:#fff;
    }
    .field-row{
      display:grid;
      grid-template-columns:160px minmax(0, 1fr);
      min-height:68px;
      border-right:1px solid var(--line-gray);
      border-bottom:1px solid var(--line-gray);
    }
    .field-label{
      display:flex;
      align-items:center;
      padding:16px 18px;
      background:var(--soft-gray);
      color:var(--brand-blue);
      font-weight:900;
      border-right:1px solid var(--line-gray);
      word-break:keep-all;
    }
    .field-value{
      display:flex;
      align-items:center;
      padding:16px 18px;
      color:var(--text-mid);
      line-height:1.6;
      word-break:keep-all;
    }
    .field-value a{
      color:var(--brand-blue);
      text-decoration:none;
      font-weight:700;
      overflow-wrap:anywhere;
    }
    .field-value a:hover,
    .field-value a:focus{
      text-decoration:underline;
      text-underline-offset:3px;
    }
    .related-articles{
      margin-top:28px;
      padding-top:26px;
      border-top:1px solid var(--line-gray);
    }
    .related-title{
      margin:0 0 14px;
      font-size:1.1rem;
      color:var(--text-dark);
      font-weight:900;
    }
    .article-list{
      display:grid;
      gap:12px;
    }
    .article-card{
      display:grid;
      grid-template-columns:minmax(120px, 180px) minmax(0, 1fr) minmax(96px, 140px);
      gap:16px;
      align-items:stretch;
      min-height:96px;
      padding:14px;
      border:1px dashed #d9dee8;
      border-radius:8px;
      background:#fff;
    }
    .article-card--link{
      border-style:solid;
      border-color:#dfe5ef;
      box-shadow:0 8px 18px rgba(12,18,46,.05);
    }
    .article-image-slot,
    .article-copy-slot,
    .article-link-slot{
      border-radius:6px;

      function appendTextList(root, items) {
        const list = document.createElement("ul");
        items.forEach(function (item) {
          const li = document.createElement("li");
          li.textContent = item;
          list.appendChild(li);
        });
        root.appendChild(list);
      }

      function createBlock(title, content) {
        const block = document.createElement("section");
        block.className = "portfolio-detail-block";
        const heading = document.createElement("h4");
        heading.textContent = title;
        block.appendChild(heading);

        if (Array.isArray(content)) {
          appendTextList(block, content);
        } else {
          const paragraph = document.createElement("p");
          paragraph.textContent = content;
          block.appendChild(paragraph);
        }

        return block;
      }

      function createFact(label, value) {
        const row = document.createElement("div");
        row.className = "portfolio-detail-fact";
        const dt = document.createElement("dt");
        dt.textContent = label;
        const dd = document.createElement("dd");
        dd.textContent = value;
        row.append(dt, dd);
        return row;
      }

      function initPortfolioCards() {
        const cards = Array.from(document.querySelectorAll(".portfolio-card"));
        const filters = Array.from(document.querySelectorAll(".portfolio-filter"));
        const grid = document.querySelector(".portfolio-grid");
        const detail = document.getElementById("portfolio-detail");
        if (!cards.length || !filters.length || !grid || !detail) return;

        const media = detail.querySelector("[data-detail-media]");
        const image = detail.querySelector("[data-detail-image]");
        const facts = detail.querySelector("[data-detail-facts]");
        const title = detail.querySelector("[data-detail-title]");
        const meta = detail.querySelector("[data-detail-meta]");
        const blocks = detail.querySelector("[data-detail-blocks]");
        let activeProject = null;

        function renderDetail(projectId) {
          const project = projects[projectId];
          if (!project) return;
          activeProject = projectId;

          cards.forEach(function (card) {
            card.classList.toggle("is-active", card.dataset.project === projectId);
          });

          media.classList.toggle("is-logo", project.imageMode === "logo");
          image.src = project.image;
          image.alt = project.imageAlt;
          facts.replaceChildren(
            createFact("Category", project.category),
            createFact("Sector", project.sector),
            createFact("Investment Type", project.investmentType),
            createFact("Candlestick Role", project.role)
          );
          title.textContent = project.title;
          meta.textContent = project.category + " · " + project.sector;
          blocks.replaceChildren(
            createBlock("Overview", project.overview),
            createBlock("Investment Rationale", project.rationale),
            createBlock("Value Creation Plan", project.valueCreation),
            createBlock("Exit Strategy", project.exitStrategy)
          );

          detail.hidden = false;
          window.requestAnimationFrame(function () {
            detail.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        }

        function applyFilter(category) {
          grid.classList.toggle("filtered-view", category !== "All");

          filters.forEach(function (filter) {
            const isActive = filter.dataset.filter === category;
            filter.classList.toggle("is-active", isActive);
            filter.setAttribute("aria-pressed", String(isActive));
          });

          let activeProjectStillVisible = false;
          cards.forEach(function (card) {
            const isVisible = category === "All" || card.dataset.category === category;
            card.hidden = !isVisible;
            if (isVisible && card.dataset.project === activeProject) {
              activeProjectStillVisible = true;
            }
          });

          if (!activeProjectStillVisible) {
            activeProject = null;
            detail.hidden = true;
            cards.forEach(function (card) {
              card.classList.remove("is-active");
            });
          }
        }

        filters.forEach(function (filter) {
          filter.addEventListener("click", function () {
            applyFilter(filter.dataset.filter);
          });
        });

        cards.forEach(function (card) {
          card.addEventListener("click", function () {
            renderDetail(card.dataset.project);
          });
        });
      }

      document.addEventListener("DOMContentLoaded", initPortfolioCards);
    })();
  </script>
